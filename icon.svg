<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="35%" cy="28%" r="75%">
      <stop offset="0%" stop-color="#2a4a2a"/>
      <stop offset="100%" stop-color="#152515"/>
    </radialGradient>
    <linearGradient id="leafGrad" x1="20%" y1="10%" x2="80%" y2="90%">
      <stop offset="0%" stop-color="#7dcf95"/>
      <stop offset="55%" stop-color="#4a9460"/>
      <stop offset="100%" stop-color="#2d6640"/>
    </linearGradient>
    <linearGradient id="stemGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4a9460"/>
      <stop offset="100%" stop-color="#2d6640"/>
    </linearGradient>
    <filter id="leafShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#0a1a0a" flood-opacity="0.4"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Subtle radial light -->
  <ellipse cx="200" cy="160" rx="180" ry="150" fill="rgba(74,148,96,0.07)"/>

  <!-- Glow behind leaf -->
  <ellipse cx="256" cy="235" rx="130" ry="130" fill="rgba(77,168,100,0.08)" filter="url(#glow)"/>

  <!-- ── LEAF ── -->
  <!-- Main leaf — pointed top and bottom, wide middle -->
  <path d="M256 108
           C 286 120, 348 158, 360 220
           C 372 282, 340 340, 296 364
           C 278 373, 258 376, 256 376
           C 254 376, 234 373, 216 364
           C 172 340, 140 282, 152 220
           C 164 158, 226 120, 256 108 Z"
        fill="url(#leafGrad)"
        filter="url(#leafShadow)"/>

  <!-- Leaf highlight (sheen) -->
  <path d="M256 115
           C 272 124, 310 152, 322 200
           C 334 248, 316 290, 290 316"
        fill="none"
        stroke="rgba(255,255,255,0.18)"
        stroke-width="12"
        stroke-linecap="round"/>

  <!-- Center vein — crisp -->
  <line x1="256" y1="120" x2="256" y2="372"
        stroke="rgba(20,50,20,0.45)"
        stroke-width="5"
        stroke-linecap="round"/>

  <!-- Side veins — left -->
  <path d="M254 185 Q 228 196, 188 192" stroke="rgba(20,50,20,0.28)" stroke-width="2.8" fill="none" stroke-linecap="round"/>
  <path d="M254 225 Q 220 238, 174 233" stroke="rgba(20,50,20,0.28)" stroke-width="2.8" fill="none" stroke-linecap="round"/>
  <path d="M254 265 Q 224 278, 182 272" stroke="rgba(20,50,20,0.25)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M254 305 Q 228 316, 192 312" stroke="rgba(20,50,20,0.22)" stroke-width="2.2" fill="none" stroke-linecap="round"/>

  <!-- Side veins — right -->
  <path d="M258 185 Q 284 196, 324 192" stroke="rgba(20,50,20,0.28)" stroke-width="2.8" fill="none" stroke-linecap="round"/>
  <path d="M258 225 Q 292 238, 338 233" stroke="rgba(20,50,20,0.28)" stroke-width="2.8" fill="none" stroke-linecap="round"/>
  <path d="M258 265 Q 288 278, 330 272" stroke="rgba(20,50,20,0.25)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M258 305 Q 284 316, 320 312" stroke="rgba(20,50,20,0.22)" stroke-width="2.2" fill="none" stroke-linecap="round"/>

  <!-- ── STEM ── -->
  <path d="M256 376 Q 252 408, 244 428"
        stroke="url(#stemGrad)"
        stroke-width="8"
        fill="none"
        stroke-linecap="round"/>

  <!-- ── GOLD DEW DROP at tip ── -->
  <!-- Outer glow -->
  <circle cx="256" cy="108" r="14" fill="rgba(200,169,110,0.25)"/>
  <!-- Drop body -->
  <circle cx="256" cy="108" r="9" fill="#c8a96e"/>
  <!-- Drop highlight -->
  <circle cx="252" cy="104" r="3.5" fill="rgba(255,245,225,0.75)"/>

  <!-- ── SMALL SPARKLES ── -->
  <!-- Top right -->
  <g transform="translate(358, 148)">
    <line x1="0" y1="-9" x2="0" y2="9" stroke="#c8a96e" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
    <line x1="-9" y1="0" x2="9" y2="0" stroke="#c8a96e" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
    <line x1="-6" y1="-6" x2="6" y2="6" stroke="#c8a96e" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
    <line x1="6" y1="-6" x2="-6" y2="6" stroke="#c8a96e" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  </g>

  <!-- Bottom left small -->
  <g transform="translate(152, 348)">
    <line x1="0" y1="-6" x2="0" y2="6" stroke="#6aab7e" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <line x1="-6" y1="0" x2="6" y2="0" stroke="#6aab7e" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- Top left tiny -->
  <circle cx="148" cy="168" r="3.5" fill="rgba(106,171,126,0.4)"/>
  <circle cx="138" cy="156" r="2" fill="rgba(200,169,110,0.3)"/>

</svg>
